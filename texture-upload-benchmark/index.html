<!doctype html>

<html>
  <head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1, user-scalable=no'>
    <meta name='mobile-web-app-capable' content='yes'>
    <meta name='apple-mobile-web-app-capable' content='yes'>

    <title>WebGPU Upload Benchmark</title>
    <style>
      #log {
        display: flex;
        flex-wrap: wrap;
      }
      #log pre {
        margin-right: 1em;
      }
    </style>
  </head>
  <body>
    <p>This page times uploading textures/buffers from JS memory using both writeTexture/writeBuffer and staging buffers.</p>
    <fieldset>
      <legend>Benchmark Options:</legend>
        <div>Upload methods:</div>
        <div>
          <input type="checkbox" id="stagingToTexture" name="stagingToTexture" checked />
          <label for="stagingToTexture">Staging Buffer->Texture</label>

          <input type="checkbox" id="writeTexture" name="writeTexture" checked />
          <label for="writeTexture">WriteTexture</label>

          <br/>

          <input type="checkbox" id="stagingToBuffer" name="stagingToBuffer" />
          <label for="stagingToBuffer">Staging Buffer->Buffer</label>

          <input type="checkbox" id="writeBuffer" name="writeBuffer" />
          <label for="writeBuffer">WriteBuffer</label>

          <input type="checkbox" id="verifyUploads" name="verifyUploads" />
          <label for="verifyUploads">Verify Uploads (Disables benchmark)</label>
        </div>
        <div>Data sizes:</div>
        <div>
          <input type="checkbox" id="size256" name="size256" checked />
          <label for="size256">256x256 (256Kb)</label>

          <input type="checkbox" id="size512" name="size512" />
          <label for="size512">512x512 (1Mb)</label>

          <input type="checkbox" id="size1024" name="size1024" checked />
          <label for="size1024">1024x1024 (4Mb)</label>

          <br/>

          <input type="checkbox" id="size2048" name="size2048" />
          <label for="size2048">2048x2048 (16Mb)</label>

          <input type="checkbox" id="size4096" name="size4096" checked />
          <label for="size4096">4096x4096 (64Mb)</label>

          <input type="checkbox" id="size8192" name="size8192" />
          <label for="size8192">8192x8192 (256Mb)</label>
        </div>
      <button id="begin">Begin Benchmark</button>
    </fieldset>
    <div id="log">

    </div>
    <script type="module">
      // Initialize WebGPU
      const adapter = await navigator.gpu.requestAdapter();
      const device = await adapter.requestDevice();

      const logContainer = document.getElementById('log');
      let logCol = null;
      function clearLog() {
        logContainer.innerText = '';
        logCol = null;
      }

      function log(string) {
        if (!logCol) {
          logCol = document.createElement('pre');
          logContainer.appendChild(logCol);
        }
        console.log(string);
        logCol.innerText += string + '\n';
      }

      function logNewCol() {
        logCol = null;
      }

      function getSrcData(byteSize) {
        const srcData = new Uint8Array(byteSize);
        for (let i = 0; i < srcData.byteLength; i+=4) {
          srcData[i+0] = 255;
          srcData[i+1] = 0;
          srcData[i+2] = 128;
          srcData[i+3] = 255;
        }
        return srcData;
      }

      function runWriteTextureTest(size, iterationsPerRun=100, runs=10) {
        const verify = verifyUploads.checked;
        if (verify) { iterationsPerRun = 1; runs = 1; }
        log(`=== writeTexture(${size}x${size}) ===`);

        let textures = [];
        for (let i = 0; i < Math.min(iterationsPerRun, 20); ++i) {
          textures.push(device.createTexture({
            label: `Texture ${i}, ${size}x${size}`,
            format: 'rgba8unorm',
            usage: GPUTextureUsage.COPY_DST | GPUTextureUsage.COPY_SRC | GPUTextureUsage.TEXTURE_SAMPLE,
            size: [size, size, 1],
          }));
        }

        const textureData = getSrcData(size*size*4);

        let totalDuration = 0;

        const DoRun = (j) => {
          if (j == runs+1) { return; }
          const start = performance.now();
          for (let i = 0; i < iterationsPerRun; ++i) {
            const texture = textures[i%textures.length];
            device.queue.writeTexture({texture}, textureData, {
              bytesPerRow: size*4,
              rowsPerImage: size,
            }, [size, size, 1]);
          }

          const OnWriteFinished = () => {
            const duration = performance.now()-start;
            log(`Run ${j}: ${duration.toFixed(2)}ms/${iterationsPerRun} uploads${j == 0 ? ' (discarded)' : ''}`);
            if (j != 0) { // Always discard the 0th run.
              totalDuration += duration;
            }
            return DoRun(j+1);
          }

          return device.queue.onSubmittedWorkDone().then(OnWriteFinished);
        }

        return DoRun(0).then(async () => {
          const avgDuration = totalDuration / runs;
          log(`Average: ${avgDuration.toFixed(2)}ms/${iterationsPerRun} uploads
          `);

          if (verify) {
            for (const texture of textures) {
              await VerifyTexture(texture, textureData);
            }
          }

          for (const texture of textures) {
            texture.destroy();
          }
        });
      }

      function runWriteBufferTest(size, iterationsPerRun=100, runs=10) {
        const verify = verifyUploads.checked;
        if (verify) { iterationsPerRun = 1; runs = 1; }
        let byteSize = size*size*4;
        let kbSize = byteSize / 1024;
        let mbSize = kbSize / 1024;
        let label = mbSize > 1 ? mbSize + 'Mb' : kbSize + 'Kb';
        log(`=== writeBuffer(${label}) ===`);

        let dstBuffers = [];
        for (let i = 0; i < Math.min(iterationsPerRun, 20); ++i) {
          dstBuffers.push(device.createBuffer({
            label: `Texture ${i}, ${label}`,
            usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.COPY_SRC | GPUBufferUsage.STORAGE,
            size: byteSize,
          }));
        }

        const srcData = getSrcData(byteSize);

        let totalDuration = 0;

        const DoRun = (j) => {
          if (j == runs+1) { return; }
          const start = performance.now();
          for (let i = 0; i < iterationsPerRun; ++i) {
            const dstBuffer = dstBuffers[i%dstBuffers.length];
            device.queue.writeBuffer(dstBuffer, 0, srcData, 0, byteSize);
          }

          const OnWriteFinished = () => {
            const duration = performance.now()-start;
            log(`Run ${j}: ${duration.toFixed(2)}ms/${iterationsPerRun} uploads${j == 0 ? ' (discarded)' : ''}`);
            if (j != 0) { // Always discard the 0th run.
              totalDuration += duration;
            }
            return DoRun(j+1);
          }

          return device.queue.onSubmittedWorkDone().then(OnWriteFinished);
        }

        return DoRun(0).then(async () => {
          const avgDuration = totalDuration / runs;
          log(`Average: ${avgDuration.toFixed(2)}ms/${iterationsPerRun} uploads
          `);

          if (verify) {
            for (const dstBuffer of dstBuffers) {
              await VerifyBuffer(dstBuffer, srcData);
            }
          }

          for (const dstBuffer of dstBuffers) {
            dstBuffer.destroy();
          }
        });
      }
      
      async function runStagingToTextureTest(size, iterationsPerRun=100, runs=10) {
        const verify = verifyUploads.checked;
        if (verify) { iterationsPerRun = 1; runs = 1; }
        log(`=== stagingToTexture(${size}x${size}) ===`);

        let textures = [];
        let mappedBuffers = [];
        let destroyBuffers = false;
        let totalBuffers = 0;

        function getMappedBuffer() {
          if (mappedBuffers.length) {
            return mappedBuffers.pop();
          }
          totalBuffers++;
          return device.createBuffer({
            usage: GPUBufferUsage.COPY_SRC | GPUBufferUsage.MAP_WRITE,
            size: size*size*4,
            mappedAtCreation: true,
          });
        }

        async function recycleBuffer(buffer) {
          if (destroyBuffers) {
            buffer.destroy();
            return;
          }
          await buffer.mapAsync(GPUMapMode.WRITE);
          mappedBuffers.push(buffer);
        }

        for (let i = 0; i < Math.min(iterationsPerRun, 20); ++i) {
          textures.push(device.createTexture({
            label: `Texture ${i}, ${size}x${size}`,
            format: 'rgba8unorm',
            usage: GPUTextureUsage.COPY_DST | GPUTextureUsage.COPY_SRC | GPUTextureUsage.TEXTURE_SAMPLE,
            size: [size, size, 1],
          }));
        }

        const textureData = getSrcData(size*size*4);

        let totalDuration = 0;

        const submitEvery = 10;

        let commandEncoder = null;
        let usedBuffers = [];

        function ensureSubmit() {
          if (commandEncoder) {
            device.queue.submit([commandEncoder.finish()]);
            commandEncoder = null;
            for (const buffer of usedBuffers) {
              recycleBuffer(buffer);
            }
            usedBuffers = [];
          }
        }

        for (let j = 0; j < runs+1; ++j) {
          const start = performance.now();
          for (let i = 0; i < iterationsPerRun; ++i) {
            if (!commandEncoder) {
              commandEncoder = device.createCommandEncoder();
            }
            const texture = textures[i%textures.length];
            const buffer = getMappedBuffer();

            const bufferData = new Uint8Array(buffer.getMappedRange());
            bufferData.set(textureData);
            buffer.unmap();
            usedBuffers.push(buffer);

            commandEncoder.copyBufferToTexture({
              buffer,
              bytesPerRow: size*4,
              rowsPerImage: size
            }, { texture },
            [size, size, 1]);

            if (i % submitEvery == 0) {
              ensureSubmit();
            }
          }
          ensureSubmit();
          await device.queue.onSubmittedWorkDone();
          const duration = performance.now()-start;
          log(`Run ${j}: ${duration.toFixed(2)}ms/${iterationsPerRun} uploads${j == 0 ? ' (discarded)' : ''}`);
          if (j == 0) { continue; } // Always discard the 0th run.
          totalDuration += duration;
        }

        const avgDuration = totalDuration / runs;
        log(`Average: ${avgDuration.toFixed(2)}ms/${iterationsPerRun} uploads
        `);

        if (verify) {
          for (const texture of textures) {
            await VerifyTexture(texture, textureData);
          }
        }

        for (const texture of textures) {
          texture.destroy();
        }

        destroyBuffers = true;
        for (const buffer of mappedBuffers) {
          buffer.destroy();
        }
      }

      async function runStagingToBufferTest(size, iterationsPerRun=100, runs=10) {
        const verify = verifyUploads.checked;
        if (verify) { iterationsPerRun = 1; runs = 1; }
        let byteSize = size*size*4;
        let kbSize = byteSize / 1024;
        let mbSize = kbSize / 1024;
        let label = mbSize > 1 ? mbSize + 'Mb' : kbSize + 'Kb';
        log(`=== stagingToBuffer(${label}) ===`);

        let dstBuffers = [];
        let mappedBuffers = [];
        let destroyBuffers = false;

        function getMappedBuffer() {
          if (mappedBuffers.length) {
            return mappedBuffers.pop();
          }
          return device.createBuffer({
            usage: GPUBufferUsage.COPY_SRC | GPUBufferUsage.MAP_WRITE,
            size: byteSize,
            mappedAtCreation: true,
          });
        }

        async function recycleBuffer(buffer) {
          if (destroyBuffers) {
            buffer.destroy();
            return;
          }
          await buffer.mapAsync(GPUMapMode.WRITE);
          mappedBuffers.push(buffer);
        }

        for (let i = 0; i < Math.min(iterationsPerRun, 20); ++i) {
          dstBuffers.push(device.createBuffer({
            label: `Texture ${i}, ${label}`,
            usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.COPY_SRC | GPUBufferUsage.STORAGE,
            size: byteSize,
          }));
        }

        const srcData = getSrcData(byteSize);

        let totalDuration = 0;

        const submitEvery = 10;

        let commandEncoder = null;
        let usedBuffers = [];

        function ensureSubmit() {
          if (commandEncoder) {
            device.queue.submit([commandEncoder.finish()]);
            commandEncoder = null;
            for (const buffer of usedBuffers) {
              recycleBuffer(buffer);
            }
            usedBuffers = [];
          }
        }

        for (let j = 0; j < runs+1; ++j) {
          const start = performance.now();
          for (let i = 0; i < iterationsPerRun; ++i) {
            if (!commandEncoder) {
              commandEncoder = device.createCommandEncoder();
            }
            const dstBuffer = dstBuffers[i%dstBuffers.length];
            const buffer = getMappedBuffer();

            const bufferData = new Uint8Array(buffer.getMappedRange());
            bufferData.set(srcData);
            buffer.unmap();
            usedBuffers.push(buffer);

            commandEncoder.copyBufferToBuffer(buffer, dstBuffer, byteSize);

            if (i % submitEvery == 0) {
              ensureSubmit();
            }
          }
          ensureSubmit();
          await device.queue.onSubmittedWorkDone();
          const duration = performance.now()-start;
          log(`Run ${j}: ${duration.toFixed(2)}ms/${iterationsPerRun} uploads${j == 0 ? ' (discarded)' : ''}`);
          if (j == 0) { continue; } // Always discard the 0th run.
          totalDuration += duration;
        }

        const avgDuration = totalDuration / runs;
        log(`Average: ${avgDuration.toFixed(2)}ms/${iterationsPerRun} uploads
        `);

        if (verify) {
          for (const dstBuffer of dstBuffers) {
            await VerifyBuffer(dstBuffer, srcData);
          }
        }

        for (const dstBuffer of dstBuffers) {
          dstBuffer.destroy();
        }

        destroyBuffers = true;
        for (const buffer of mappedBuffers) {
          buffer.destroy();
        }
      }

      async function VerifyTexture(texture, expected) {
        const readbackBuffer = device.createBuffer({
          usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ,
          size: expected.byteLength,
        });

        const encoder = device.createCommandEncoder();
        encoder.copyTextureToBuffer(
          { texture },
          { buffer: readbackBuffer, bytesPerRow: texture.width*4 },
          { width: texture.width, height: texture.height, depthOrArrayLayers: 1});
        device.queue.submit([encoder.finish()]);

        await readbackBuffer.mapAsync(GPUMapMode.READ);
        const values = new Uint8Array(readbackBuffer.getMappedRange());

        const isExpected = indexedDB.cmp(values, expected) === 0;
        log(isExpected ? 'Contents Validated ✅' : 'Contents do not match! ☠️');
        return isExpected;
      }

      async function VerifyBuffer(buffer, expected) {
        const readbackBuffer = device.createBuffer({
          usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ,
          size: buffer.size,
        });

        const encoder = device.createCommandEncoder();
        encoder.copyBufferToBuffer(buffer, readbackBuffer, buffer.size);
        device.queue.submit([encoder.finish()]);

        await readbackBuffer.mapAsync(GPUMapMode.READ);
        const values = new Uint8Array(readbackBuffer.getMappedRange());

        const isExpected = indexedDB.cmp(values, expected) === 0;
        log(isExpected ? 'Contents Validated ✅' : 'Contents do not match! ☠️');
        return isExpected;
      }

      async function beginStagingToTexture() {
        if (!stagingToTexture.checked) { return; }
        logNewCol();
        if (size256.checked) { await runStagingToTextureTest(256); }
        if (size512.checked) { await runStagingToTextureTest(512); }
        if (size1024.checked) { await runStagingToTextureTest(1024); }
        if (size2048.checked) { await runStagingToTextureTest(2048); }
        if (size4096.checked) { await runStagingToTextureTest(4096, 10); }
        if (size8192.checked) { await runStagingToTextureTest(8192, 10); }
      }

      async function beginWriteTexture() {
        if (!writeTexture.checked) { return; }
        logNewCol();
        if (size256.checked) { await runWriteTextureTest(256); }
        if (size512.checked) { await runWriteTextureTest(512); }
        if (size1024.checked) { await runWriteTextureTest(1024); }
        if (size2048.checked) { await runWriteTextureTest(2048); }
        if (size4096.checked) { await runWriteTextureTest(4096, 10); }
        if (size8192.checked) { await runWriteTextureTest(8192, 10); }
      }

      async function beginStagingToBuffer() {
        if (!stagingToBuffer.checked) { return; }
        logNewCol();
        if (size256.checked) { await runStagingToBufferTest(256); }
        if (size512.checked) { await runStagingToBufferTest(512); }
        if (size1024.checked) { await runStagingToBufferTest(1024); }
        if (size2048.checked) { await runStagingToBufferTest(2048); }
        if (size4096.checked) { await runStagingToBufferTest(4096, 10); }
        if (size8192.checked) { await runStagingToBufferTest(8192, 10); }
      }

      async function beginWriteBuffer() {
        if (!writeBuffer.checked) { return; }
        logNewCol();
        if (size256.checked) { await runWriteBufferTest(256); }
        if (size512.checked) { await runWriteBufferTest(512); }
        if (size1024.checked) { await runWriteBufferTest(1024); }
        if (size2048.checked) { await runWriteBufferTest(2048); }
        if (size4096.checked) { await runWriteBufferTest(4096, 10); }
        if (size8192.checked) { await runWriteBufferTest(8192, 10); }
      }

      begin.addEventListener('click', async () => {
        clearLog();
        await beginStagingToTexture();
        await beginWriteTexture();
        await beginStagingToBuffer();
        await beginWriteBuffer();
      });

    </script>
  </body>
</html>
